<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GA360 API — Documentação</title>
    <meta name="description" content="GA360 Public API — integre com n8n, Make, MCP e outros sistemas." />
    <link rel="stylesheet" type="text/css" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css" />
    <style>
      * { box-sizing: border-box; }

      body {
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f8f9fa;
      }

      /* Header GA360 */
      .ga360-header {
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
        color: #fff;
        padding: 20px 40px;
        display: flex;
        align-items: center;
        gap: 16px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      }

      .ga360-header-logo {
        font-size: 22px;
        font-weight: 800;
        letter-spacing: -0.5px;
        color: #fff;
      }

      .ga360-header-logo span {
        color: #64b5f6;
      }

      .ga360-header-divider {
        width: 1px;
        height: 30px;
        background: rgba(255,255,255,0.3);
      }

      .ga360-header-subtitle {
        font-size: 14px;
        color: rgba(255,255,255,0.7);
        font-weight: 400;
      }

      .ga360-header-badge {
        margin-left: auto;
        background: rgba(100,181,246,0.2);
        color: #64b5f6;
        border: 1px solid rgba(100,181,246,0.4);
        border-radius: 20px;
        padding: 4px 12px;
        font-size: 12px;
        font-weight: 600;
      }

      /* Info bar */
      .ga360-infobar {
        background: #fff;
        border-bottom: 1px solid #e0e0e0;
        padding: 12px 40px;
        display: flex;
        align-items: center;
        gap: 24px;
        font-size: 13px;
        color: #555;
      }

      .ga360-infobar a {
        color: #0f3460;
        text-decoration: none;
        font-weight: 500;
      }

      .ga360-infobar a:hover { text-decoration: underline; }

      .ga360-infobar .sep { color: #ccc; }

      /* Swagger container */
      #swagger-ui {
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px 16px;
      }

      /* Override Swagger UI styles for GA360 look */
      .swagger-ui .topbar { display: none !important; }

      .swagger-ui .info .title {
        font-size: 28px !important;
        font-weight: 700 !important;
        color: #1a1a2e !important;
      }

      .swagger-ui .info .description p {
        font-size: 14px;
        color: #555;
        line-height: 1.6;
      }

      .swagger-ui .opblock-tag {
        font-size: 16px !important;
        font-weight: 600 !important;
        color: #1a1a2e !important;
      }

      .swagger-ui .opblock.opblock-get .opblock-summary-method { background: #0f7b6c !important; }
      .swagger-ui .opblock.opblock-post .opblock-summary-method { background: #0f3460 !important; }
      .swagger-ui .opblock.opblock-patch .opblock-summary-method { background: #b45309 !important; }
      .swagger-ui .opblock.opblock-delete .opblock-summary-method { background: #b91c1c !important; }

      .swagger-ui .btn.authorize {
        background: #0f3460 !important;
        border-color: #0f3460 !important;
        color: #fff !important;
        border-radius: 6px !important;
      }

      .swagger-ui .btn.authorize:hover { background: #16213e !important; }

      .swagger-ui section.models { display: none !important; } /* Oculta schemas no rodapé */
    </style>
  </head>
  <body>
    <div class="ga360-header">
      <div class="ga360-header-logo">GA<span>360</span></div>
      <div class="ga360-header-divider"></div>
      <div class="ga360-header-subtitle">Public API — Documentação Interativa</div>
      <div class="ga360-header-badge">v1.0</div>
    </div>

    <div class="ga360-infobar">
      <span>🔑 Gere sua API Key em <a href="/admin/api-keys" target="_blank">Admin → API &amp; Integrações</a></span>
      <span class="sep">|</span>
      <span>📡 Base URL: <code id="base-url-display" style="background:#f0f0f0;padding:2px 6px;border-radius:4px;font-size:12px;"></code></span>
      <span class="sep">|</span>
      <span><a href="https://docs.n8n.io/integrations/builtin/core-nodes/n8n-nodes-base.httprequest/" target="_blank">Documentação n8n HTTP Request</a></span>
    </div>

    <div id="swagger-ui"></div>

    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-standalone-preset.js"></script>
    <script>
      // URL do OpenAPI spec — Edge Function Supabase
      const SUPABASE_URL = "https://zveqhxaiwghexfobjaek.supabase.co";
      const OPENAPI_URL = `${SUPABASE_URL}/functions/v1/public-api/v1/openapi.json`;
      const BASE_URL = `${SUPABASE_URL}/functions/v1/public-api/v1`;

      // Exibe a base URL no infobar
      document.getElementById("base-url-display").textContent = BASE_URL;

      window.onload = function () {
        SwaggerUIBundle({
          url: OPENAPI_URL,
          dom_id: "#swagger-ui",
          deepLinking: true,
          presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
          plugins: [SwaggerUIBundle.plugins.DownloadUrl],
          layout: "BaseLayout",
          persistAuthorization: true,
          displayRequestDuration: true,
          defaultModelsExpandDepth: -1,
          docExpansion: "list",
          filter: true,
          syntaxHighlight: { activate: true, theme: "monokai" },
        });
      };
    </script>
  </body>
</html>
